name: Fishing Countdown

on:
  schedule:
    - cron: '*/15 * * * *'  # Каждые 15 минут — сам разберётся что слать
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Decide and send
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          # Текущее время в МСК
          NOW_MSK=$(TZ='Europe/Moscow' date '+%Y-%m-%d %H:%M')
          NOW_TS=$(date +%s)
          echo "Now MSK: $NOW_MSK"
          
          # === РАСПИСАНИЕ: дата-время МСК → ID сообщения ===
          # Формат: "YYYY-MM-DD HH:MM|id"
          SCHEDULE='2026-05-19 21:15|first
          2026-05-19 22:00|tue_night
          2026-05-20 09:00|wed_morning
          2026-05-20 10:00|wed_10
          2026-05-20 11:00|wed_11
          2026-05-20 12:00|wed_12
          2026-05-20 13:00|wed_13
          2026-05-20 14:00|wed_14
          2026-05-20 15:00|wed_15
          2026-05-20 16:00|wed_16
          2026-05-20 17:00|wed_17
          2026-05-20 18:00|wed_18
          2026-05-20 19:00|wed_19
          2026-05-20 20:00|wed_20
          2026-05-20 21:00|wed_21
          2026-05-20 22:00|wed_night
          2026-05-21 09:00|thu_09
          2026-05-21 10:00|thu_10
          2026-05-21 11:00|thu_11
          2026-05-21 12:00|thu_12
          2026-05-21 13:00|thu_13
          2026-05-21 14:00|thu_14
          2026-05-21 15:00|thu_15
          2026-05-21 16:00|thu_16
          2026-05-21 17:00|thu_17
          2026-05-21 18:00|thu_18
          2026-05-21 19:00|thu_19
          2026-05-21 20:00|thu_20
          2026-05-21 21:00|thu_21
          2026-05-21 22:00|thu_night
          2026-05-22 09:00|fri_09
          2026-05-22 10:00|fri_10
          2026-05-22 11:00|departure
          2026-05-22 11:30|left
          2026-05-22 15:00|toast_start
          2026-05-22 15:30|toast_1
          2026-05-22 16:00|toast_2
          2026-05-22 16:30|toast_3
          2026-05-22 17:00|toast_4
          2026-05-22 17:30|toast_5
          2026-05-22 18:00|toast_6
          2026-05-22 18:30|toast_7
          2026-05-22 19:00|toast_8
          2026-05-22 19:30|toast_9
          2026-05-22 20:00|banya'
          
          # Папка для отметок отправленных постов
          mkdir -p sent_log
          
          # === Функция отправки ===
          get_msg() {
            case "$1" in
              first) echo $'🎣 <b>ПАЦАНЫ, ОТСЧЁТ ПОШЁЛ!</b>\n\nДо рыбалки ровно <b>62 часа</b>\n\nЧерви уже пакуют чемоданы 🪱\nНервничают, суетятся.\n\n<i>Поехали 🚗💨</i>' ;;
              tue_night) echo $'🌙 <b>22:00. 61 час до выезда</b>\n\nПоследний пост на сегодня.\nИди спать, баран —\nзавтра ещё работать 😴\n\n<i>Бот тоже отдыхает до 9 утра</i>' ;;
              wed_morning) echo $'☀️ <b>09:00. Доброе утро, мужики!</b>\n\n⏳ До выезда 50 часов\n\n🐟 Щука уже не спит —\nсмотрит на дверь и матерится' ;;
              wed_10) echo $'☕ <b>10:00. 49 часов</b>\n\nКофе пьём,\nна работу едем,\nмыслями уже на берегу 🎣' ;;
              wed_11) echo $'📦 <b>11:00. 48 часов</b>\n\nРовно <b>двое суток</b> до выезда!\n\n<i>Время идёт как улитка...</i> 🐌' ;;
              wed_12) echo $'🐠 <b>12:00. 47 часов</b>\n\nКарась в этот момент\nпишет завещание...\n\n<i>Прощается с роднёй</i> 😢' ;;
              wed_13) echo $'🍔 <b>13:00. Обед</b>\n\nКушай нормально.\nНа рыбалке тушёнка с хлебом\nи водкой запить — это праздник,\nа не еда 🥃' ;;
              wed_14) echo $'⏰ <b>14:00. 45 часов</b>\n\nСамое время проверить:\n▫️ Где удочка?\n▫️ Где леска?\n▫️ Где ёбаные крючки?!\n\n<i>Куда ты их дел в прошлый раз?</i>' ;;
              wed_15) echo $'🥱 <b>15:00. После обеда тянет в сон</b>\n\nНе спи, работай!\nЗавтра ещё целый день терпеть,\nа потом — РЫБАЛКА 🎣' ;;
              wed_16) echo $'👀 <b>16:00. 43 часа</b>\n\nЖена ещё не знает,\nчто ты уезжаешь на сутки...\n\n<i>Или знает? 🤔</i>' ;;
              wed_17) echo $'🏁 <b>17:00. Конец рабочего дня</b>\n\nКто свободен — собирайтесь!\nКто не свободен — терпите.\n\n<i>Жизнь несправедлива</i> 😏' ;;
              wed_18) echo $'🍺 <b>18:00. 41 час</b>\n\nПора начинать\n<b>МОРАЛЬНО ГОТОВИТЬ ПЕЧЕНЬ</b>\n\n🥃🥃🥃' ;;
              wed_19) echo $'🍲 <b>19:00. Ужин</b>\n\nСъешь нормально дома.\nЗавтра жена приготовит\nбутерброды в дорогу 🥪\n\n<i>Если повезёт</i>' ;;
              wed_20) echo $'📺 <b>20:00. 39 часов</b>\n\nСидишь, делаешь вид что смотришь телек,\nа сам уже в озере по пояс 🎣' ;;
              wed_21) echo $'🛒 <b>21:00. 38 часов</b>\n\nЗавтра — последний день\nчтобы докупить что забыл.\n\n<i>Составляй список, пока не забыл и это</i>' ;;
              wed_night) echo $'🌙 <b>22:00. Спокойной ночи</b>\n\nЗавтра — пятница!\nДо выезда 37 часов.\n\n<i>Бот спит до 9:00</i> 😴' ;;
              thu_09) echo $'🌅 <b>09:00. ПЯТНИЦА ЗАВТРА, МУЖИКИ!</b>\n\n⏳ 26 часов до выезда\n\nСамый длинный день в году.\nТерпим, держимся 💪' ;;
              thu_10) echo $'☕ <b>10:00. 25 часов</b>\n\nКофе уже не помогает.\nГлаза смотрят на часы,\nруки чешутся собирать снасти 🎣' ;;
              thu_11) echo $'⏰ <b>11:00. РОВНО СУТКИ!</b>\n\n🔥 24 часа до выезда 🔥\n\nЗавтра в это время мы уже едем,\nматерясь по пробкам 🚗💨🤬' ;;
              thu_12) echo $'🎒 <b>12:00. 23 часа</b>\n\nУже можно собирать сумку.\n\n<i>Ну как можно — НУЖНО НАХУЙ!</i>' ;;
              thu_13) echo $'🍾 <b>13:00. Обед. 22 часа</b>\n\n❓ Водка куплена?\n\n<i>Если нет — ты охуел.</i>\n\n🥃 После работы — в магазин!' ;;
              thu_14) echo $'📋 <b>14:00. Чек-лист, 21 час:</b>\n\n☑️ Удочка\n☑️ Снасти\n☑️ Червяки\n☑️ Водка\n☑️ Закуска\n☑️ Совесть — <i>оставить дома</i>' ;;
              thu_15) echo $'🕒 <b>15:00. 20 часов</b>\n\nКаждая минута на работе\nсейчас тянется как час.\n\n<i>Часы тоже сговорились</i> 😤' ;;
              thu_16) echo $'⏱ <b>16:00. 19 часов</b>\n\nНа работе все уже видят,\nчто ты не работаешь.\n\n<i>А похуй</i> 😎' ;;
              thu_17) echo $'🏃‍♂️ <b>17:00. ШАБАШ!</b>\n\nДомой! Собираться!\nСнасти! Водка! Червяки!\n\n<i>В таком порядке!</i> 🎣' ;;
              thu_18) echo $'🏠 <b>18:00. 16 часов</b>\n\nДома уже всё разложено?\nЖена смотрит молча,\nкот смотрит понимающе 🐱' ;;
              thu_19) echo $'🌆 <b>19:00. 15 часов</b>\n\nПоследний нормальный вечер дома:\n💋 Целуй жену\n🐱 Гладь кота\n💪 Готовься к подвигам' ;;
              thu_20) echo $'🛏 <b>20:00. 14 часов</b>\n\nЛожиться рано?\nНе уснёшь от волнения.\n\nЛожиться поздно?\nЗавтра встанешь как зомби 🧟' ;;
              thu_21) echo $'🌃 <b>21:00. 13 часов</b>\n\nЗапомни этот вечер.\nЗавтра в это время\nты уже будешь другим человеком 🎣' ;;
              thu_night) echo $'😴 <b>22:00. СПАТЬ!</b>\n\n12 часов до выезда.\nКто не спит — тот мудак.\n\n<i>Бот спит до 9 утра</i>' ;;
              fri_09) echo $'🚨 <b>09:00. ДЕНЬ Х!</b> 🚨\n\n2 часа до выезда!\n\n⏰ Подъём\n🚿 Душ\n🎒 Шмотки\n🚗 По коням!' ;;
              fri_10) echo $'⌛ <b>10:00. ЧАС ДО ВЫЕЗДА!</b>\n\nКто опаздывает — звоним!\nКто опаздывает второй раз —\n<b>УЕЗЖАЕМ БЕЗ НЕГО</b> 😈' ;;
              departure) echo $'🎣🎣🎣 <b>11:00. ПОЕХАЛИ НАХУЙ!</b> 🎣🎣🎣\n\n🚗💨💨💨\n\nЗа рулём — не пить!\nОстальные — догоняйте,\nкто что не успел дома 🍻' ;;
              left) echo $'🚗💨 <b>11:30. МЫ ВЫЕХАЛИ!</b>\n\nКто опаздывает —\n<b>ДОГОНЯЙТЕ!</b>\n\nЖдать никого не будем 😈🐟' ;;
              toast_start) echo $'🥃 <b>15:00. А ЧТО ЭТО МЫ НЕ ПЬЁМ?!</b>\n\n<b>ДАВАЙ, НАЛИВАЙ!</b>\n\nРыба сама себя не отметит 🐟🍻' ;;
              toast_1) echo $'🥃 <b>Тост №1</b>\n\nЗа то, чтобы клевало!\nИ чтоб не только у соседа 🎣\n\n<i>До дна!</i>' ;;
              toast_2) echo $'🥃 <b>Тост №2</b>\n\nЗа рыбу!\nТу, что поймали, и ту,\nчто ещё попадётся 🐟\n\n<i>До дна!</i>' ;;
              toast_3) echo $'🥃 <b>Тост №3</b>\n\nЗа жён, которые отпустили!\nДай им бог здоровья\nи терпения 🙏\n\n<i>До дна!</i>' ;;
              toast_4) echo $'🥃 <b>Тост №4</b>\n\nЗа пацанов!\nЧтоб мы и через 20 лет\nтак же собирались 🤝\n\n<i>До дна!</i>' ;;
              toast_5) echo $'🥃 <b>Тост №5</b>\n\nЗа того,\nкто не смог приехать.\nПомним, скорбим 😢\n\n<i>Шутка. До дна!</i>' ;;
              toast_6) echo $'🥃 <b>Тост №6</b>\n\nЗа удачу!\nИ за то, чтоб гаишники\nна обратном пути не попадались 🚓\n\n<i>До дна!</i>' ;;
              toast_7) echo $'🥃 <b>Тост №7</b>\n\nЗа природу!\nКомары — твари, конечно,\nно без них было бы скучно 🦟\n\n<i>До дна!</i>' ;;
              toast_8) echo $'🥃 <b>Тост №8</b>\n\nЗа того, кто варит уху!\nБез ухи рыбалка —\nэто просто пьянка на природе 🍲\n\n<i>До дна!</i>' ;;
              toast_9) echo $'🥃 <b>Тост №9 — ПОСЛЕДНИЙ ПЕРЕД БАНЕЙ!</b>\n\nЗа то, чтобы баня\nбыла горячей, а пиво — холодным! 🔥🍺\n\n<i>До дна!</i>' ;;
              banya) echo $'🔥🔥🔥 <b>БАНЯ ГОТОВА!</b> 🔥🔥🔥\n\n<b>ПОШЛИ ВСЕ В БАНЮ!</b>\n\n🧖‍♂️🧖‍♂️🧖‍♂️\n\n<i>С лёгким паром, мужики!</i> 🍺' ;;
            esac
          }
          
          send_msg() {
            local id="$1"
            local msg
            msg=$(get_msg "$id")
            if [ -z "$msg" ]; then return; fi
            
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              -d "parse_mode=HTML" \
              --data-urlencode "text=$msg" > /dev/null
            
            # Помечаем как отправленное
            touch "sent_log/${id}.sent"
            echo "Sent: $id"
          }
          
          # === Если ручной запуск — шлём тестовый и выходим ===
          if [ "$MANUAL" = "true" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              -d "parse_mode=HTML" \
              --data-urlencode "text=🤖 <b>Тестовый запуск</b>%0A%0AБот работает ✅%0AСледующий пост придёт по расписанию" > /dev/null
            echo "Manual test sent"
            exit 0
          fi
          
          # === Проверяем какие посты пора отправлять ===
          # Логика: смотрим все слоты, которые УЖЕ должны были быть отправлены,
          # но не были (нет файла sent_log/<id>.sent). Отправляем самый свежий по времени.
          
          BEST_ID=""
          BEST_TS=0
          
          while IFS='|' read -r slot_time slot_id; do
            slot_time=$(echo "$slot_time" | xargs)
            slot_id=$(echo "$slot_id" | xargs)
            [ -z "$slot_id" ] && continue
            
            slot_ts=$(TZ='Europe/Moscow' date -d "$slot_time" +%s 2>/dev/null)
            [ -z "$slot_ts" ] && continue
            
            # Слот должен быть в прошлом (или сейчас) и не старше 45 минут
            age=$((NOW_TS - slot_ts))
            if [ "$age" -ge 0 ] && [ "$age" -le 2700 ]; then
              # Уже отправляли?
              if [ ! -f "sent_log/${slot_id}.sent" ]; then
                # Берём самый свежий из неотправленных в окне
                if [ "$slot_ts" -gt "$BEST_TS" ]; then
                  BEST_TS=$slot_ts
                  BEST_ID=$slot_id
                fi
              fi
            fi
          done <<< "$SCHEDULE"
          
          if [ -n "$BEST_ID" ]; then
            send_msg "$BEST_ID"
          else
            echo "Nothing to send at $NOW_MSK"
          fi
      
      - name: Commit sent log
        if: github.event_name != 'workflow_dispatch'
        run: |
          git config user.name "fishing-bot"
          git config user.email "bot@local"
          git add sent_log/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Mark sent posts"
            git push
          fi
