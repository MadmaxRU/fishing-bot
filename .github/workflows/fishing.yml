name: Fishing Countdown
on:
  schedule:
    - cron: '0 11 19 5 *'
    - cron: '0 16 19 5 *'
    - cron: '0 21 19 5 *'
    - cron: '0 2 20 5 *'
    - cron: '0 7 20 5 *'
    - cron: '0 12 20 5 *'
    - cron: '0 17 20 5 *'
    - cron: '0 22 20 5 *'
    - cron: '0 3 21 5 *'
    - cron: '0 8 21 5 *'
    - cron: '0 13 21 5 *'
    - cron: '0 18 21 5 *'
    - cron: '0 23 21 5 *'
    - cron: '0 4 22 5 *'
    - cron: '0 8 22 5 *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send message
        run: |
          HOUR=$(date -u +%H)
          DAY=$(date -u +%d)
          
          case "$DAY-$HOUR" in
            "19-11") MSG="🎣 <b>ДО РЫБАЛКИ 69 ЧАСОВ</b> 🎣%0A%0AПацаны, отсчёт пошёл!%0AЧерви уже пакуют чемоданы 🪱%0AНервничают, суетятся.%0A%0A<i>Поехали 🚗💨</i>" ;;
            "19-16") MSG="⏳ <b>64 часа до выезда</b>%0A%0A🐟 Щука в озере посмотрела прогноз погоды%0Aи говорит: «блядь, опять эти приедут»%0A%0A😤" ;;
            "19-21") MSG="🌙 <b>Полночь приближается</b>%0A%0A⏰ До рыбалки 59 часов%0A%0A😴 Кто не спит — тот думает о рыбалке%0A💭 Кто спит — тому она снится%0A%0A🎣🎣🎣" ;;
            "20-02") MSG="🌅 <b>54 часа</b>%0A%0AСамое время проверить:%0A▫️ Где удочка? 🎣%0A▫️ Где леска?%0A▫️ Где ёбаные крючки?!%0A%0A<i>Куда ты их в прошлый раз дел, а?</i>" ;;
            "20-07") MSG="☀️ <b>49 часов</b> — меньше двух суток!%0A%0A👀 Жена ещё не знает,%0Aчто ты уезжаешь на сутки...%0A%0A<i>Или знает? 🤔</i>" ;;
            "20-12") MSG="📝 <b>44 часа до часа Х</b>%0A%0A🐠 Карась в этот момент%0Aпишет завещание...%0A%0A<i>Прощается с роднёй</i> 😢" ;;
            "20-17") MSG="🍺 <b>39 часов до выезда</b>%0A%0AПора начинать%0A<b>МОРАЛЬНО ГОТОВИТЬ ПЕЧЕНЬ</b>%0A%0A🥃🥃🥃" ;;
            "20-22") MSG="🌃 <b>34 часа</b>%0A%0A😡 Если ты сейчас читаешь это —%0A<b>иди спать, баран!</b>%0AЗавтра ещё работать!%0A%0A😤" ;;
            "21-03") MSG="🌄 <b>29 часов</b>%0A%0AМеньше суток с хвостом 🐟%0A%0AУже можно начинать собирать сумку.%0A%0A<i>Ну как можно — НУЖНО НАХУЙ!</i> 🎒" ;;
            "21-08") MSG="⏰ <b>РОВНО СУТКИ!</b>%0A%0A🔥 24 часа до выезда 🔥%0A%0AЗавтра в это время мы уже едем,%0Aматерясь по пробкам 🚗💨🤬" ;;
            "21-13") MSG="🍾 <b>19 ЧАСОВ</b>%0A%0A❓ Водка куплена?%0A%0A<i>Если нет — ты охуел.</i>%0A%0A🥃 Бегом в магазин! 🏃‍♂️💨" ;;
            "21-18") MSG="🏠 <b>14 часов</b>%0A%0AПоследний нормальный вечер дома:%0A💋 Целуй жену%0A🐱 Гладь кота%0A💪 Готовься к подвигам%0A%0A<i>Завтра — РЫБАЛКА</i> 🎣" ;;
            "21-23") MSG="🌙 <b>9 часов</b>%0A%0A😴 Кто спит — молодец%0A👁 Кто не спит и читает это —%0A<b>ты долбоёб</b>%0A%0A<i>...но я тебя понимаю</i> 🤝" ;;
            "22-04") MSG="🚨 <b>4 ЧАСА, МУЖИКИ!</b> 🚨%0A%0A<b>ЧЕ-ТЫ-РЕ!</b>%0A%0A⏰ Подъём%0A🚿 Умывайтесь%0A🎣 Погнали ловить%0Aэту чешуйчатую сволочь!" ;;
            "22-08") MSG="🎣🎣🎣 <b>ВСЁ. ПОЕХАЛИ НАХУЙ!</b> 🎣🎣🎣%0A%0A🚗💨💨💨%0A%0A🍻 За рыбалку! 🍻" ;;
            *) MSG="🤖 <b>Тестовый запуск бота</b>%0A%0AЕсли ты это видишь — <i>всё работает, пацаны</i> ✅" ;;
          esac
          
          if [ -n "$MSG" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
              -d "parse_mode=HTML" \
              --data-urlencode "text=$MSG"
          fi
