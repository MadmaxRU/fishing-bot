name: Fishing Countdown
on:
  schedule:
    # ===== Отсчёт до рыбалки =====
    - cron: '0 18 19 5 *'    # Ср 21:00 МСК
    - cron: '0 6 20 5 *'     # Чт 09:00 МСК
    - cron: '0 8 20 5 *'     # Чт 11:00 МСК
    - cron: '0 10 20 5 *'    # Чт 13:00 МСК
    - cron: '0 12 20 5 *'    # Чт 15:00 МСК
    - cron: '0 14 20 5 *'    # Чт 17:00 МСК
    - cron: '0 16 20 5 *'    # Чт 19:00 МСК
    - cron: '0 18 20 5 *'    # Чт 21:00 МСК
    - cron: '0 6 21 5 *'     # Пт 09:00 МСК
    - cron: '0 8 21 5 *'     # Пт 11:00 МСК
    - cron: '0 10 21 5 *'    # Пт 13:00 МСК
    - cron: '0 12 21 5 *'    # Пт 15:00 МСК
    - cron: '0 14 21 5 *'    # Пт 17:00 МСК
    - cron: '0 16 21 5 *'    # Пт 19:00 МСК
    - cron: '0 18 21 5 *'    # Пт 21:00 МСК
    - cron: '0 6 22 5 *'     # Сб 09:00 МСК
    - cron: '0 8 22 5 *'     # Сб 11:00 МСК — ВЫЕЗД
    # ===== Выехали =====
    - cron: '30 8 22 5 *'    # Сб 11:30 МСК
    # ===== Тосты =====
    - cron: '0 12 22 5 *'    # Сб 15:00 МСК
    - cron: '30 12 22 5 *'   # Сб 15:30 МСК
    - cron: '0 13 22 5 *'    # Сб 16:00 МСК
    - cron: '30 13 22 5 *'   # Сб 16:30 МСК
    - cron: '0 14 22 5 *'    # Сб 17:00 МСК
    - cron: '30 14 22 5 *'   # Сб 17:30 МСК
    - cron: '0 15 22 5 *'    # Сб 18:00 МСК
    - cron: '30 15 22 5 *'   # Сб 18:30 МСК
    - cron: '0 16 22 5 *'    # Сб 19:00 МСК
    - cron: '30 16 22 5 *'   # Сб 19:30 МСК
    # ===== Баня =====
    - cron: '0 17 22 5 *'    # Сб 20:00 МСК
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send message
        run: |
          KEY="$(date -u +%d-%H-%M)"
          
          case "$KEY" in
            "19-18-00") MSG=$'🎣 <b>Пацаны, отсчёт пошёл!</b>\n\nДо рыбалки ровно 62 часа.\nЧерви уже пакуют чемоданы 🪱\nНервничают, суетят
