name: Fishing Countdown
on:
  schedule:
    # ===== Вт 19.05 =====
    - cron: '15 18 19 5 *'   # Вт 21:15 МСК
    - cron: '0 19 19 5 *'    # Вт 22:00 МСК
    # ===== Ср 20.05 =====
    - cron: '0 6 20 5 *'     # Ср 09:00
    - cron: '0 7 20 5 *'     # Ср 10:00
    - cron: '0 8 20 5 *'     # Ср 11:00
    - cron: '0 9 20 5 *'     # Ср 12:00
    - cron: '0 10 20 5 *'    # Ср 13:00
    - cron: '0 11 20 5 *'    # Ср 14:00
    - cron: '0 12 20 5 *'    # Ср 15:00
    - cron: '0 13 20 5 *'    # Ср 16:00
    - cron: '0 14 20 5 *'    # Ср 17:00
    - cron: '0 15 20 5 *'    # Ср 18:00
    - cron: '0 16 20 5 *'    # Ср 19:00
    - cron: '0 17 20 5 *'    # Ср 20:00
    - cron: '0 18 20 5 *'    # Ср 21:00
    - cron: '0 19 20 5 *'    # Ср 22:00
    # ===== Чт 21.05 =====
    - cron: '0 6 21 5 *'     # Чт 09:00
    - cron: '0 7 21 5 *'     # Чт 10:00
    - cron: '0 8 21 5 *'     # Чт 11:00
    - cron: '0 9 21 5 *'     # Чт 12:00
    - cron: '0 10 21 5 *'    # Чт 13:00
    - cron: '0 11 21 5 *'    # Чт 14:00
    - cron: '0 12 21 5 *'    # Чт 15:00
    - cron: '0 13 21 5 *'    # Чт 16:00
    - cron: '0 14 21 5 *'    # Чт 17:00
    - cron: '0 15 21 5 *'    # Чт 18:00
    - cron: '0 16 21 5 *'    # Чт 19:00
    - cron: '0 17 21 5 *'    # Чт 20:00
    - cron: '0 18 21 5 *'    # Чт 21:00
    - cron: '0 19 21 5 *'    # Чт 22:00
    # ===== Пт 22.05 — выезд =====
    - cron: '0 6 22 5 *'     # Пт 09:00
    - cron: '0 7 22 5 *'     # Пт 10:00
    - cron: '0 8 22 5 *'     # Пт 11:00 — ВЫЕЗД
    - cron: '30 8 22 5 *'    # Пт 11:30 — выехали
    # ===== Тосты Пт =====
    - cron: '0 12 22 5 *'    # Пт 15:00
    - cron: '30 12 22 5 *'   # Пт 15:30
    - cron: '0 13 22 5 *'    # Пт 16:00
    - cron: '30 13 22 5 *'   # Пт 16:30
    - cron: '0 14 22 5 *'    # Пт 17:00
    - cron: '30 14 22 5 *'   # Пт 17:30
    - cron: '0 15 22 5 *'    # Пт 18:00
    - cron: '30 15 22 5 *'   # Пт 18:30
    - cron: '0 16 22 5 *'    # Пт 19:00
    - cron: '30 16 22 5 *'   # Пт 19:30
    # ===== Баня =====
    - cron: '0 17 22 5 *'    # Пт 20:00
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send message
        run: |
          DAY=$(date -u +%d)
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          MIN=$((10#$MIN))
          HOUR_NUM=$((10#$HOUR))
          
          if [ "$MIN" -lt 15 ]; then
            ROUNDED_MIN="00"
            ROUNDED_HOUR=$(printf "%02d" $HOUR_NUM)
          elif [ "$MIN" -lt 45 ]; then
            ROUNDED_MIN="30"
            ROUNDED_HOUR=$(printf "%02d" $HOUR_NUM)
          else
            ROUNDED_MIN="00"
            ROUNDED_HOUR=$(printf "%02d" $((HOUR_NUM + 1)))
          fi
          
          KEY="$DAY-$ROUNDED_HOUR-$ROUNDED_MIN"
          echo "UTC: $(date -u). KEY: $KEY"
          
          case "$KEY" in
            "19-18-15") MSG=$'🎣 <b>ПАЦАНЫ, ОТСЧЁТ ПОШЁЛ!</b>\n\nДо рыбалки ровно <b>62 часа</b>\n\nЧерви уже пакуют чемоданы 🪱\nНервничают, суетятся.\n\n<i>Поехали 🚗💨</i>' ;;
            "19-19-00") MSG=$'🌙 <b>22:00. 61 час до выезда</b>\n\nПоследний пост на сегодня.\nИди спать, баран —\nзавтра ещё работать 😴\n\n<i>Бот тоже отдыхает до 9 утра</i>' ;;
            "20-06-00") MSG=$'☀️ <b>09:00. Доброе утро, мужики!</b>\n\n⏳ До выезда 50 часов\n\n🐟 Щука уже не спит —\nсмотрит на дверь и матерится' ;;
            "20-07-00") MSG=$'☕ <b>10:00. 49 часов</b>\n\nКофе пьём,\nна работу едем,\nмыслями уже на берегу 🎣' ;;
            "20-08-00") MSG=$'📦 <b>11:00. 48 часов</b>\n\nРовно <b>двое суток</b> до выезда!\n\n<i>Время идёт как улитка...</i> 🐌' ;;
            "20-09-00") MSG=$'🐠 <b>12:00. 47 часов</b>\n\nКарась в этот момент\nпишет завещание...\n\n<i>Прощается с роднёй</i> 😢' ;;
            "20-10-00") MSG=$'🍔 <b>13:00. Обед</b>\n\nКушай нормально.\nНа рыбалке тушёнка с хлебом\nи водкой запить — это праздник,\nа не еда 🥃' ;;
            "20-11-00") MSG=$'⏰ <b>14:00. 45 часов</b>\n\nСамое время проверить:\n▫️ Где удочка?\n▫️ Где леска?\n▫️ Где ёбаные крючки?!\n\n<i>Куда ты их дел в прошлый раз?</i>' ;;
            "20-12-00") MSG=$'🥱 <b>15:00. После обеда тянет в сон</b>\n\nНе спи, работай!\nЗавтра ещё целый день терпеть,\nа потом — РЫБАЛКА 🎣' ;;
            "20-13-00") MSG=$'👀 <b>16:00. 43 часа</b>\n\nЖена ещё не знает,\nчто ты уезжаешь на сутки...\n\n<i>Или знает? 🤔</i>' ;;
            "20-14-00") MSG=$'🏁 <b>17:00. Конец рабочего дня</b>\n\nКто свободен — собирайтесь!\nКто не свободен — терпите.\n\n<i>Жизнь несправедлива</i> 😏' ;;
            "20-15-00") MSG=$'🍺 <b>18:00. 41 час</b>\n\nПора начинать\n<b>МОРАЛЬНО ГОТОВИТЬ ПЕЧЕНЬ</b>\n\n🥃🥃🥃' ;;
            "20-16-00") MSG=$'🍲 <b>19:00. Ужин</b>\n\nСъешь нормально дома.\nЗавтра жена приготовит\nбутерброды в дорогу 🥪\n\n<i>Если повезёт</i>' ;;
            "20-17-00") MSG=$'📺 <b>20:00. 39 часов</b>\n\nСидишь, делаешь вид что смотришь телек,\nа сам уже в озере по пояс 🎣' ;;
            "20-18-00") MSG=$'🛒 <b>21:00. 38 часов</b>\n\nЗавтра — последний день\nчтобы докупить что забыл.\n\n<i>Составляй список, пока не забыл и это</i>' ;;
            "20-19-00") MSG=$'🌙 <b>22:00. Спокойной ночи</b>\n\nЗавтра — пятница!\nДо выезда 37 часов.\n\n<i>Бот спит до 9:00</i> 😴' ;;
            "21-06-00") MSG=$'🌅 <b>09:00. ПЯТНИЦА, МУЖИКИ!</b>\n\n⏳ 26 часов до выезда\n\nСамый длинный день в году.\nТерпим, держимся 💪' ;;
            "21-07-00") MSG=$'☕ <b>10:00. 25 часов</b>\n\nКофе уже не помогает.\nГлаза смотрят на часы,\nруки чешутся собирать снасти 🎣' ;;
            "21-08-00") MSG=$'⏰ <b>11:00. РОВНО СУТКИ!</b>\n\n🔥 24 часа до выезда 🔥\n\nЗавтра в это время мы уже едем,\nматерясь по пробкам 🚗💨🤬' ;;
            "21-09-00") MSG=$'🎒 <b>12:00. 23 часа</b>\n\nУже можно собирать сумку.\n\n<i>Ну как можно — НУЖНО НАХУЙ!</i>' ;;
            "21-10-00") MSG=$'🍾 <b>13:00. Обед. 22 часа</b>\n\n❓ Водка куплена?\n\n<i>Если нет — ты охуел.</i>\n\n🥃 После работы — в магазин!' ;;
            "21-11-00") MSG=$'📋 <b>14:00. Чек-лист, 21 час:</b>\n\n☑️ Удочка\n☑️ Снасти\n☑️ Червяки\n☑️ Водка\n☑️ Закуска\n☑️ Совесть — <i>оставить дома</i>' ;;
            "21-12-00") MSG=$'🕒 <b>15:00. 20 часов</b>\n\nКаждая минута на работе\nсейчас тянется как час.\n\n<i>Часы тоже сговорились</i> 😤' ;;
            "21-13-00") MSG=$'⏱ <b>16:00. 19 часов</b>\n\nНа работе все уже видят,\nчто ты не работаешь.\n\n<i>А похуй</i> 😎' ;;
            "21-14-00") MSG=$'🏃‍♂️ <b>17:00. ШАБАШ!</b>\n\nДомой! Собираться!\nСнасти! Водка! Червяки!\n\n<i>В таком порядке!</i> 🎣' ;;
            "21-15-00") MSG=$'🏠 <b>18:00. 16 часов</b>\n\nДома уже всё разложено?\nЖена смотрит молча,\nкот смотрит понимающе 🐱' ;;
            "21-16-00") MSG=$'🌆 <b>19:00. 15 часов</b>\n\nПоследний нормальный вечер дома:\n💋 Целуй жену\n🐱 Гладь кота\n💪 Готовься к подвигам' ;;
            "21-17-00") MSG=$'🛏 <b>20:00. 14 часов</b>\n\nЛожиться рано?\nНе уснёшь от волнения.\n\nЛожиться поздно?\nЗавтра встанешь как зомби 🧟' ;;
            "21-18-00") MSG=$'🌃 <b>21:00. 13 часов</b>\n\nЗапомни этот вечер.\nЗавтра в это время\nты уже будешь другим человеком 🎣' ;;
            "21-19-00") MSG=$'😴 <b>22:00. СПАТЬ!</b>\n\n12 часов до выезда.\nКто не спит — тот мудак.\n\n<i>Бот спит до 9 утра</i>' ;;
            "22-06-00") MSG=$'🚨 <b>09:00. ДЕНЬ Х!</b> 🚨\n\n2 часа до выезда!\n\n⏰ Подъём\n🚿 Душ\n🎒 Шмотки\n🚗 По коням!' ;;
            "22-07-00") MSG=$'⌛ <b>10:00. ЧАС ДО ВЫЕЗДА!</b>\n\nКто опаздывает — звоним!\nКто опаздывает второй раз —\n<b>УЕЗЖАЕМ БЕЗ НЕГО</b> 😈' ;;
            "22-08-00") MSG=$'🎣🎣🎣 <b>11:00. ПОЕХАЛИ НАХУЙ!</b> 🎣🎣🎣\n\n🚗💨💨💨\n\nЗа рулём — не пить!\nОстальные — догоняйте,\nкто что не успел дома 🍻' ;;
            "22-08-30") MSG=$'🚗💨 <b>11:30. МЫ ВЫЕХАЛИ!</b>\n\nКто опаздывает —\n<b>ДОГОНЯЙТЕ!</b>\n\nЖдать никого не будем 😈🐟' ;;
            "22-12-00") MSG=$'🥃 <b>15:00. А ЧТО ЭТО МЫ НЕ ПЬЁМ?!</b>\n\n<b>ДАВАЙ, НАЛИВАЙ!</b>\n\nРыба сама себя не отметит 🐟🍻' ;;
            "22-12-30") MSG=$'🥃 <b>Тост №1</b>\n\nЗа то, чтобы клевало!\nИ чтоб не только у соседа 🎣\n\n<i>До дна!</i>' ;;
            "22-13-00") MSG=$'🥃 <b>Тост №2</b>\n\nЗа рыбу!\nТу, что поймали, и ту,\nчто ещё попадётся 🐟\n\n<i>До дна!</i>' ;;
            "22-13-30") MSG=$'🥃 <b>Тост №3</b>\n\nЗа жён, которые отпустили!\nДай им бог здоровья\nи терпения 🙏\n\n<i>До дна!</i>' ;;
            "22-14-00") MSG=$'🥃 <b>Тост №4</b>\n\nЗа пацанов!\nЧтоб мы и через 20 лет\nтак же собирались 🤝\n\n<i>До дна!</i>' ;;
            "22-14-30") MSG=$'🥃 <b>Тост №5</b>\n\nЗа того,\nкто не смог приехать.\nПомним, скорбим 😢\n\n<i>Шутка. До дна!</i>' ;;
            "22-15-00") MSG=$'🥃 <b>Тост №6</b>\n\nЗа удачу!\nИ за то, чтоб гаишники\nна обратном пути не попадались 🚓\n\n<i>До дна!</i>' ;;
            "22-15-30") MSG=$'🥃 <b>Тост №7</b>\n\nЗа природу!\nКомары — твари, конечно,\nно без них было бы скучно 🦟\n\n<i>До дна!</i>' ;;
            "22-16-00") MSG=$'🥃 <b>Тост №8</b>\n\nЗа того, кто варит уху!\nБез ухи рыбалка —\nэто просто пьянка на природе 🍲\n\n<i>До дна!</i>' ;;
            "22-16-30") MSG=$'🥃 <b>Тост №9</b>\n\nЗа здоровье!\nНаше, печёночное.\nОна сегодня героически держится 💪\n\n<i>До дна!</i>' ;;
            "22-17-00") MSG=$'🥃 <b>Тост №10 — ПОСЛЕДНИЙ ПЕРЕД БАНЕЙ!</b>\n\nЗа то, чтобы баня\nбыла горячей, а пиво — холодным! 🔥🍺\n\n<i>До дна!</i>' ;;
            "22-17-30") MSG=$'🔥🔥🔥 <b>БАНЯ ГОТОВА!</b> 🔥🔥🔥\n\n<b>ПОШЛИ ВСЕ В БАНЮ!</b>\n\n🧖‍♂️🧖‍♂️🧖‍♂️\n\n<i>С лёгким паром, мужики!</i> 🍺' ;;
            *) MSG="" ;;
          esac
          
          if [ -n "$MSG" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
              -d "parse_mode=HTML" \
              --data-urlencode "text=$MSG"
          fi
