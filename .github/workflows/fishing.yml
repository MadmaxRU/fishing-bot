name: Fishing Countdown

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send post
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          DATE=$(TZ='Europe/Moscow' date '+%Y-%m-%d')
          HOUR=$(TZ='Europe/Moscow' date '+%H')
          MIN=$(TZ='Europe/Moscow' date '+%M')
          MIN=$((10#$MIN))
          HOUR_NUM=$((10#$HOUR))
          
          echo "Now MSK: $DATE ${HOUR}:${MIN}"
          
          # Определяем целевой слот:
          # окно :00-:09 → шлём пост за HH:00
          # окно :30-:39 → шлём пост за HH:30
          # вне окон — молчим
          if [ "$MIN" -le 9 ]; then
            SLOT="${HOUR}:00"
          elif [ "$MIN" -ge 30 ] && [ "$MIN" -le 39 ]; then
            SLOT="${HOUR}:30"
          else
            echo "Outside send window (min=$MIN), exit"
            exit 0
          fi
          
          KEY="${DATE}_${SLOT}"
          echo "Slot key: $KEY"
          
          MSG=""
          case "$KEY" in
            "2026-05-20_10:00") MSG=$'☕ <b>10:00. 49 часов</b>\n\nКофе пьём,\nна работу едем,\nмыслями уже на берегу 🎣' ;;
            "2026-05-20_11:00") MSG=$'📦 <b>11:00. 48 часов</b>\n\nРовно <b>двое суток</b> до выезда!\n\n<i>Время идёт как улитка...</i> 🐌' ;;
            "2026-05-20_12:00") MSG=$'🐠 <b>12:00. 47 часов</b>\n\nКарась в этот момент\nпишет завещание...\n\n<i>Прощается с роднёй</i> 😢' ;;
            "2026-05-20_13:00") MSG=$'🍔 <b>13:00. Обед</b>\n\nКушай нормально.\nНа рыбалке тушёнка с хлебом\nи водкой запить — это праздник,\nа не еда 🥃' ;;
            "2026-05-20_14:00") MSG=$'⏰ <b>14:00. 45 часов</b>\n\nСамое время проверить:\n▫️ Где удочка?\n▫️ Где леска?\n▫️ Где ёбаные крючки?!\n\n<i>Куда ты их дел в прошлый раз?</i>' ;;
            "2026-05-20_15:00") MSG=$'🥱 <b>15:00. После обеда тянет в сон</b>\n\nНе спи, работай!\nЗавтра ещё целый день терпеть,\nа потом — РЫБАЛКА 🎣' ;;
            "2026-05-20_16:00") MSG=$'👀 <b>16:00. 43 часа</b>\n\nЖена ещё не знает,\nчто ты уезжаешь на сутки...\n\n<i>Или знает? 🤔</i>' ;;
            "2026-05-20_17:00") MSG=$'🏁 <b>17:00. Конец рабочего дня</b>\n\nКто свободен — собирайтесь!\nКто не свободен — терпите.\n\n<i>Жизнь несправедлива</i> 😏' ;;
            "2026-05-20_18:00") MSG=$'🍺 <b>18:00. 41 час</b>\n\nПора начинать\n<b>МОРАЛЬНО ГОТОВИТЬ ПЕЧЕНЬ</b>\n\n🥃🥃🥃' ;;
            "2026-05-20_19:00") MSG=$'🍲 <b>19:00. Ужин</b>\n\nСъешь нормально дома.\nЗавтра жена приготовит\nбутерброды в дорогу 🥪\n\n<i>Если повезёт</i>' ;;
            "2026-05-20_20:00") MSG=$'📺 <b>20:00. 39 часов</b>\n\nСидишь, делаешь вид что смотришь телек,\nа сам уже в озере по пояс 🎣' ;;
            "2026-05-20_21:00") MSG=$'🛒 <b>21:00. 38 часов</b>\n\nЗавтра — последний день\nчтобы докупить что забыл.\n\n<i>Составляй список</i>' ;;
            "2026-05-20_22:00") MSG=$'🌙 <b>22:00. Спокойной ночи</b>\n\nЗавтра — четверг!\nДо выезда 37 часов 😴' ;;
            "2026-05-21_09:00") MSG=$'🌅 <b>09:00. Четверг!</b>\n\n⏳ 26 часов до выезда\n\nЗавтра — ПЯТНИЦА И РЫБАЛКА!\nДержимся, мужики 💪' ;;
            "2026-05-21_10:00") MSG=$'☕ <b>10:00. 25 часов</b>\n\nКофе уже не помогает.\nГлаза смотрят на часы,\nруки чешутся собирать снасти 🎣' ;;
            "2026-05-21_11:00") MSG=$'⏰ <b>11:00. РОВНО СУТКИ!</b>\n\n🔥 24 часа до выезда 🔥\n\nЗавтра в это время мы уже едем,\nматерясь по пробкам 🚗💨🤬' ;;
            "2026-05-21_12:00") MSG=$'🎒 <b>12:00. 23 часа</b>\n\nУже можно собирать сумку.\n\n<i>Ну как можно — НУЖНО НАХУЙ!</i>' ;;
            "2026-05-21_13:00") MSG=$'🍾 <b>13:00. Обед. 22 часа</b>\n\n❓ Водка куплена?\n\n<i>Если нет — ты охуел.</i>\n\n🥃 После работы — в магазин!' ;;
            "2026-05-21_14:00") MSG=$'📋 <b>14:00. Чек-лист, 21 час:</b>\n\n☑️ Удочка\n☑️ Снасти\n☑️ Червяки\n☑️ Водка\n☑️ Закуска\n☑️ Совесть — <i>оставить дома</i>' ;;
            "2026-05-21_15:00") MSG=$'🕒 <b>15:00. 20 часов</b>\n\nКаждая минута на работе\nсейчас тянется как час.\n\n<i>Часы тоже сговорились</i> 😤' ;;
            "2026-05-21_16:00") MSG=$'⏱ <b>16:00. 19 часов</b>\n\nНа работе все уже видят,\nчто ты не работаешь.\n\n<i>А похуй</i> 😎' ;;
            "2026-05-21_17:00") MSG=$'🏃 <b>17:00. ШАБАШ!</b>\n\nДомой! Собираться!\nСнасти! Водка! Червяки!\n\n<i>В таком порядке!</i> 🎣' ;;
            "2026-05-21_18:00") MSG=$'🏠 <b>18:00. 16 часов</b>\n\nДома уже всё разложено?\nЖена смотрит молча,\nкот смотрит понимающе 🐱' ;;
            "2026-05-21_19:00") MSG=$'🌆 <b>19:00. 15 часов</b>\n\nПоследний нормальный вечер дома:\n💋 Целуй жену\n🐱 Гладь кота\n💪 Готовься к подвигам' ;;
            "2026-05-21_20:00") MSG=$'🛏 <b>20:00. 14 часов</b>\n\nЛожиться рано?\nНе уснёшь от волнения.\n\nЛожиться поздно?\nЗавтра встанешь как зомби 🧟' ;;
            "2026-05-21_21:00") MSG=$'🌃 <b>21:00. 13 часов</b>\n\nЗапомни этот вечер.\nЗавтра в это время\nты уже будешь другим человеком 🎣' ;;
            "2026-05-21_22:00") MSG=$'😴 <b>22:00. СПАТЬ!</b>\n\n12 часов до выезда.\nКто не спит — тот мудак.' ;;
            "2026-05-22_09:00") MSG=$'🚨 <b>09:00. ДЕНЬ Х!</b> 🚨\n\n2 часа до выезда!\n\n⏰ Подъём\n🚿 Душ\n🎒 Шмотки\n🚗 По коням!' ;;
            "2026-05-22_10:00") MSG=$'⌛ <b>10:00. ЧАС ДО ВЫЕЗДА!</b>\n\nКто опаздывает — звоним!\nКто опаздывает второй раз —\n<b>УЕЗЖАЕМ БЕЗ НЕГО</b> 😈' ;;
            "2026-05-22_11:00") MSG=$'🎣🎣🎣 <b>11:00. ПОЕХАЛИ НАХУЙ!</b> 🎣🎣🎣\n\n🚗💨💨💨\n\nЗа рулём — не пить!\nОстальные — догоняйте,\nкто что не успел дома 🍻' ;;
            "2026-05-22_11:30") MSG=$'🚗💨 <b>11:30. МЫ ВЫЕХАЛИ!</b>\n\nКто опаздывает —\n<b>ДОГОНЯЙТЕ!</b>\n\nЖдать никого не будем 😈🐟' ;;
            "2026-05-22_15:00") MSG=$'🥃 <b>15:00. А ЧТО ЭТО МЫ НЕ ПЬЁМ?!</b>\n\n<b>ДАВАЙ, НАЛИВАЙ!</b>\n\nРыба сама себя не отметит 🐟🍻' ;;
            "2026-05-22_15:30") MSG=$'🥃 <b>Тост №1</b>\n\nЗа то, чтобы клевало!\nИ чтоб не только у соседа 🎣\n\n<i>До дна!</i>' ;;
            "2026-05-22_16:00") MSG=$'🥃 <b>Тост №2</b>\n\nЗа рыбу!\nТу, что поймали, и ту,\nчто ещё попадётся 🐟\n\n<i>До дна!</i>' ;;
            "2026-05-22_16:30") MSG=$'🥃 <b>Тост №3</b>\n\nЗа жён, которые отпустили!\nДай им бог здоровья\nи терпения 🙏\n\n<i>До дна!</i>' ;;
            "2026-05-22_17:00") MSG=$'🥃 <b>Тост №4</b>\n\nЗа пацанов!\nЧтоб мы и через 20 лет\nтак же собирались 🤝\n\n<i>До дна!</i>' ;;
            "2026-05-22_17:30") MSG=$'🥃 <b>Тост №5</b>\n\nЗа того,\nкто не смог приехать.\nПомним, скорбим 😢\n\n<i>Шутка. До дна!</i>' ;;
            "2026-05-22_18:00") MSG=$'🥃 <b>Тост №6</b>\n\nЗа удачу!\nИ за то, чтоб гаишники\nна обратном пути не попадались 🚓\n\n<i>До дна!</i>' ;;
            "2026-05-22_18:30") MSG=$'🥃 <b>Тост №7</b>\n\nЗа природу!\nКомары — твари, конечно,\nно без них было бы скучно 🦟\n\n<i>До дна!</i>' ;;
            "2026-05-22_19:00") MSG=$'🥃 <b>Тост №8</b>\n\nЗа того, кто варит уху!\nБез ухи рыбалка —\nэто просто пьянка на природе 🍲\n\n<i>До дна!</i>' ;;
            "2026-05-22_19:30") MSG=$'🥃 <b>Тост №9 — ПОСЛЕДНИЙ ПЕРЕД БАНЕЙ!</b>\n\nЗа то, чтобы баня\nбыла горячей, а пиво — холодным! 🔥🍺\n\n<i>До дна!</i>' ;;
            "2026-05-22_20:00") MSG=$'🔥🔥🔥 <b>БАНЯ ГОТОВА!</b> 🔥🔥🔥\n\n<b>ПОШЛИ ВСЕ В БАНЮ!</b>\n\n🧖‍♂️🧖‍♂️🧖‍♂️\n\n<i>С лёгким паром, мужики!</i> 🍺' ;;
          esac
          
          if [ -z "$MSG" ]; then
            echo "No message for $KEY, skipping"
            exit 0
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=$MSG"
          echo ""
          echo "Sent: $KEY"
