name: Fishing Countdown
on:
  schedule:
    # ===== Отсчёт до рыбалки =====
    - cron: '0 18 19 5 *'    # Ср 21:00 МСК
    - cron: '0 6 20 5 *'     # Чт 09:00 МСК
    - cron: '0 8 20 5 *'     # Чт 11:00 МСК
    - cron: '0 10 20 5 *'    # Чт 13:00 МСК
    - cron: '0 12 20 5 *'    # Чт 15:00 МСК
    - cron: '0 14 20 5 *'    # Чт 17:00 МСК
    - cron: '0 16 20 5 *'    # Чт 19:00 МСК
    - cron: '0 18 20 5 *'    # Чт 21:00 МСК
    - cron: '0 6 21 5 *'     # Пт 09:00 МСК
    - cron: '0 8 21 5 *'     # Пт 11:00 МСК
    - cron: '0 10 21 5 *'    # Пт 13:00 МСК
    - cron: '0 12 21 5 *'    # Пт 15:00 МСК
    - cron: '0 14 21 5 *'    # Пт 17:00 МСК
    - cron: '0 16 21 5 *'    # Пт 19:00 МСК
    - cron: '0 18 21 5 *'    # Пт 21:00 МСК
    - cron: '0 6 22 5 *'     # Сб 09:00 МСК
    - cron: '0 8 22 5 *'     # Сб 11:00 МСК — ВЫЕЗД
    # ===== Выехали =====
    - cron: '30 8 22 5 *'    # Сб 11:30 МСК
    # ===== Тосты =====
    - cron: '0 12 22 5 *'    # Сб 15:00 МСК
    - cron: '30 12 22 5 *'   # Сб 15:30 МСК
    - cron: '0 13 22 5 *'    # Сб 16:00 МСК
    - cron: '30 13 22 5 *'   # Сб 16:30 МСК
    - cron: '0 14 22 5 *'    # Сб 17:00 МСК
    - cron: '30 14 22 5 *'   # Сб 17:30 МСК
    - cron: '0 15 22 5 *'    # Сб 18:00 МСК
    - cron: '30 15 22 5 *'   # Сб 18:30 МСК
    - cron: '0 16 22 5 *'    # Сб 19:00 МСК
    - cron: '30 16 22 5 *'   # Сб 19:30 МСК
    # ===== Баня =====
    - cron: '0 17 22 5 *'    # Сб 20:00 МСК
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send message
        run: |
          KEY="$(date -u +%d-%H-%M)"
          
          case "$KEY" in
            "19-18-00") MSG=$'🎣 <b>Пацаны, отсчёт пошёл!</b>\n\nДо рыбалки ровно 62 часа.\nЧерви уже пакуют чемоданы 🪱\nНервничают, суетятся.\n\n<i>Поехали 🚗💨</i>' ;;
            
            "20-06-00") MSG=$'☀️ <b>Доброе утро, мужики!</b>\n\n⏳ До выезда 50 часов\n\n🐟 Щука в озере уже не спит —\nсмотрит на дверь и матерится.' ;;
            "20-08-00") MSG=$'☕ <b>48 часов</b>\n\nРовно двое суток до выезда.\nКофе пьём, на работу едем,\nа мыслями уже на берегу 🎣' ;;
            "20-10-00") MSG=$'🐠 <b>46 часов</b>\n\nКарась в этот момент\nпишет завещание...\n\n<i>Прощается с роднёй</i> 😢' ;;
            "20-12-00") MSG=$'🍔 <b>Обед, 44 часа до выезда</b>\n\nКушай нормально, не давись.\nНа рыбалке тушёнка с хлебом\nи водкой запить — это праздник,\nа не еда 🥃' ;;
            "20-14-00") MSG=$'⏰ <b>42 часа</b>\n\nСамое время проверить:\n▫️ Где удочка? 🎣\n▫️ Где леска?\n▫️ Где ёбаные крючки?!\n\n<i>Куда ты их в прошлый раз дел, а?</i>' ;;
            "20-16-00") MSG=$'🕓 <b>40 часов</b>\n\n👀 Жена ещё не знает,\nчто ты уезжаешь на сутки...\n\n<i>Или знает? 🤔</i>' ;;
            "20-18-00") MSG=$'🍺 <b>38 часов до выезда</b>\n\nПора начинать\n<b>МОРАЛЬНО ГОТОВИТЬ ПЕЧЕНЬ</b>\n\n🥃🥃🥃' ;;
            
            "21-06-00") MSG=$'🌅 <b>Пятница, мужики!</b>\n\n⏳ 26 часов до выезда\n\nСегодня самый длинный день\nв году. Терпим, держимся 💪' ;;
            "21-08-00") MSG=$'⏰ <b>РОВНО СУТКИ!</b>\n\n🔥 24 часа до выезда 🔥\n\nЗавтра в это время мы уже едем,\nматерясь по пробкам 🚗💨🤬' ;;
            "21-10-00") MSG=$'🎒 <b>22 часа</b>\n\nУже можно начинать собирать сумку.\n\n<i>Ну как можно — НУЖНО НАХУЙ!</i>' ;;
            "21-12-00") MSG=$'🍾 <b>20 часов. Обед.</b>\n\n❓ Водка куплена?\n\n<i>Если нет — ты охуел.</i>\n\n🥃 После работы — в магазин! 🏃‍♂️💨' ;;
            "21-14-00") MSG=$'📋 <b>18 часов. Чек-лист:</b>\n\n☑️ Удочка\n☑️ Снасти\n☑️ Червяки\n☑️ Водка\n☑️ Закуска\n☑️ Совесть — оставить дома' ;;
            "21-16-00") MSG=$'🏠 <b>16 часов</b>\n\nЗапомни этот вечер.\nЗавтра в это время\nты уже будешь другим человеком 🎣' ;;
            "21-18-00") MSG=$'🌆 <b>14 часов</b>\n\nПоследний нормальный вечер дома:\n💋 Целуй жену\n🐱 Гладь кота\n💪 Готовься к подвигам' ;;
            
            "22-06-00") MSG=$'🚨 <b>2 ЧАСА, МУЖИКИ!</b> 🚨\n\n<b>ДВА!</b>\n\n⏰ Подъём\n🚿 Умывайтесь\n🎒 Хватай шмотки\n🚗 По коням!' ;;
            "22-08-00") MSG=$'🎣🎣🎣 <b>ПОЕХАЛИ НАХУЙ!</b> 🎣🎣🎣\n\n🚗💨💨💨\n\nЗа рулём — не пить!\nОстальные — догоняйте,\nкто что не успел дома 🍻' ;;
            
            "22-08-30") MSG=$'🚗💨 <b>МЫ ВЫЕХАЛИ!</b>\n\nКто опаздывает —\n<b>ДОГОНЯЙТЕ!</b>\n\nЖдать никого не будем 😈🐟' ;;
            
            "22-12-00") MSG=$'🥃 <b>15:00. А ЧТО ЭТО МЫ НЕ ПЬЁМ?!</b>\n\n<b>ДАВАЙ, НАЛИВАЙ!</b>\n\nРыба сама себя не отметит 🐟🍻' ;;
            "22-12-30") MSG=$'🥃 <b>Тост №1</b>\n\nЗа то, чтобы клевало!\nИ чтоб не только у соседа 🎣\n\n<i>До дна!</i>' ;;
            "22-13-00") MSG=$'🥃 <b>Тост №2</b>\n\nЗа рыбу!\nТу, что поймали, и ту,\nчто ещё попадётся 🐟\n\n<i>До дна!</i>' ;;
            "22-13-30") MSG=$'🥃 <b>Тост №3</b>\n\nЗа жён, которые отпустили!\nДай им бог здоровья\nи терпения 🙏\n\n<i>До дна!</i>' ;;
            "22-14-00") MSG=$'🥃 <b>Тост №4</b>\n\nЗа пацанов!\nЧтоб мы и через 20 лет\nтак же собирались 🤝\n\n<i>До дна!</i>' ;;
            "22-14-30") MSG=$'🥃 <b>Тост №5</b>\n\nЗа того,\nкто не смог приехать.\nПомним, скорбим 😢\n\n<i>Шутка. До дна!</i>' ;;
            "22-15-00") MSG=$'🥃 <b>Тост №6</b>\n\nЗа удачу!\nИ за то, чтоб гаишники\nна обратном пути не попадались 🚓\n\n<i>До дна!</i>' ;;
            "22-15-30") MSG=$'🥃 <b>Тост №7</b>\n\nЗа природу!\nКомары — твари, конечно,\nно без них было бы скучно 🦟\n\n<i>До дна!</i>' ;;
            "22-16-00") MSG=$'🥃 <b>Тост №8</b>\n\nЗа того, кто варит уху!\nБез ухи рыбалка —\nэто просто пьянка на природе 🍲\n\n<i>До дна!</i>' ;;
            "22-16-30") MSG=$'🥃 <b>Тост №9</b>\n\nЗа здоровье!\nНаше, печёночное.\nОна сегодня героически держится 💪\n\n<i>До дна!</i>' ;;
            "22-17-00") MSG=$'🥃 <b>Тост №10 — последний перед баней!</b>\n\nЗа то, чтобы баня\nбыла горячей, а пиво — холодным! 🔥🍺\n\n<i>До дна!</i>' ;;
            
            "22-17-30") MSG=$'🔥🔥🔥 <b>БАНЯ ГОТОВА!</b> 🔥🔥🔥\n\n<b>ПОШЛИ ВСЕ В БАНЮ!</b>\n\n🧖‍♂️🧖‍♂️🧖‍♂️\n\n<i>С лёгким паром, мужики!</i> 🍺' ;;
            
            *) MSG=$'🤖 <b>Тестовый запуск</b>\n\nЕсли видишь это — <i>всё работает</i> ✅' ;;
          esac
          
          if [ -n "$MSG" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
              -d "parse_mode=HTML" \
              --data-urlencode "text=$MSG"
          fi
