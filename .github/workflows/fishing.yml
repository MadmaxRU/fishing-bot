name: Fishing Countdown
on:
  schedule:
    - cron: '0 11 19 5 *'
    - cron: '0 16 19 5 *'
    - cron: '0 21 19 5 *'
    - cron: '0 2 20 5 *'
    - cron: '0 7 20 5 *'
    - cron: '0 12 20 5 *'
    - cron: '0 17 20 5 *'
    - cron: '0 22 20 5 *'
    - cron: '0 3 21 5 *'
    - cron: '0 8 21 5 *'
    - cron: '0 13 21 5 *'
    - cron: '0 18 21 5 *'
    - cron: '0 23 21 5 *'
    - cron: '0 4 22 5 *'
    - cron: '0 8 22 5 *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send message
        run: |
          HOUR=$(date -u +%H)
          DAY=$(date -u +%d)
          
          case "$DAY-$HOUR" in
            "19-11") MSG="🎣 Пацаны, до рыбалки 69 часов. Черви уже пакуют чемоданы, нервничают." ;;
            "19-16") MSG="64 часа. Щука в озере посмотрела прогноз погоды и говорит блядь опять эти приедут." ;;
            "19-21") MSG="Полночь скоро. Кто не спит — тот думает о рыбалке. Кто спит — тому она снится." ;;
            "20-02") MSG="54 часа. Самое время проверить — а где вообще удочка? А леска? А ёбаные крючки куда дел в прошлый раз?" ;;
            "20-07") MSG="49 часов. Меньше двух суток. Жена ещё не знает что ты уезжаешь на сутки. Или знает?" ;;
            "20-12") MSG="44 часа. Карась в этот момент пишет завещание." ;;
            "20-17") MSG="39 часов до выезда. Пора начинать морально готовить печень." ;;
            "20-22") MSG="34 часа. Если ты сейчас читаешь это — иди спать баран, завтра ещё работать." ;;
            "21-03") MSG="29 часов. Меньше суток с хвостом. Уже можно начинать собирать сумку. Ну как можно — нужно нахуй." ;;
            "21-08") MSG="Ровно сутки. 24 часа. Завтра в это время мы уже едем матерясь по пробкам." ;;
            "21-13") MSG="19 часов. Водка куплена? Если нет — ты охуел." ;;
            "21-18") MSG="14 часов. Последний нормальный вечер дома. Целуй жену, гладь кота, готовься к подвигам." ;;
            "21-23") MSG="9 часов. Кто спит — молодец. Кто не спит и читает это — ты долбоёб, но я тебя понимаю." ;;
            "22-04") MSG="4 часа мужики. ЧЕТЫРЕ. Подъём, умывайтесь, и погнали ловить эту чешуйчатую сволочь." ;;
            "22-08") MSG="ВСЁ. Поехали нахуй. 🎣🍻" ;;
            *) MSG="🤖 Тестовый запуск бота. Если ты это видишь — всё работает, пацаны." ;;
          esac
          
          if [ -n "$MSG" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
              -d "text=$MSG"
          fi
